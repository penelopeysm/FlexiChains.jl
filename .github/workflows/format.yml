name: Format

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  runic:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
      - uses: julia-actions/cache@v3
      - uses: fredrikekre/runic-action@v1
        with:
          version: '1'
